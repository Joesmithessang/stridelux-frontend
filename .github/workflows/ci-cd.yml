name: STRIDELUX CI/CD Pipeline

# ─────────────────────────────────────────────────────────────
# Triggers
#   • Every push to main          → CI + deploy to production
#   • Every pull_request to main  → CI only (no deploy)
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  # Opt into Node.js 24 for action runners ahead of the June 16 forced migration.
  # This affects only how actions/checkout and actions/setup-node themselves run,
  # not the Node.js version used to build the project (controlled by NODE_VERSION).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Job 1: CI ─────────────────────────────────────────────
  # Runs on every push and every pull request.
  # Validates that the code compiles and all tests pass.
  # ──────────────────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      # Build with mock mode so no real AWS credentials are needed
      # during CI. This confirms the app compiles without errors.
      - name: Build (CI smoke test)
        run: npm run build
        env:
          CI: false                    # treat ESLint warnings as warnings, not errors
          REACT_APP_USE_MOCK: 'true'

      - name: Upload build artifact
        # Only save the artifact when we're on main — the deploy job needs it
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: production-build-${{ github.sha }}
          path: build/
          retention-days: 1

  # ── Job 2: Deploy ─────────────────────────────────────────
  # Runs ONLY on push to main, AFTER the CI job passes.
  # Rebuilds with real AWS env vars, syncs to S3, and busts
  # the CloudFront cache so users see the new version immediately.
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # GitHub Environment — lets you add required reviewers or
    # a wait timer before production deployments in repo Settings.
    environment:
      name: production
      url: https://${{ vars.CLOUDFRONT_DOMAIN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Production build with real AWS credentials injected
      # from GitHub Secrets — .env is never committed to the repo.
      - name: Build for production
        run: npm run build
        env:
          CI: false
          REACT_APP_COGNITO_USER_POOL_ID: ${{ secrets.REACT_APP_COGNITO_USER_POOL_ID }}
          REACT_APP_COGNITO_CLIENT_ID: ${{ secrets.REACT_APP_COGNITO_CLIENT_ID }}
          REACT_APP_COGNITO_REGION: ${{ secrets.REACT_APP_COGNITO_REGION }}
          REACT_APP_API_GATEWAY_URL: ${{ secrets.REACT_APP_API_GATEWAY_URL }}
          REACT_APP_S3_MEDIA_URL: ${{ secrets.REACT_APP_S3_MEDIA_URL }}
          REACT_APP_STRIPE_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_STRIPE_PUBLISHABLE_KEY }}
          REACT_APP_USE_MOCK: 'false'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Hashed asset files (main.abc123.js, etc.) can be cached
      # forever — their name changes with every build.
      # index.html must NEVER be cached so browsers always fetch
      # the latest version with the correct script/style hashes.
      - name: Sync build to S3
        run: |
          aws s3 sync build/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

          aws s3 cp build/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      # Clear the CloudFront edge caches so all users worldwide
      # immediately receive the new build.
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Write deployment summary
        run: |
          echo "### Deployment successful" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://${{ vars.CLOUDFRONT_DOMAIN }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
